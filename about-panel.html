<!-- ══════════════════════════════════════════════════
     PANNEAU À PROPOS — Arcana style
     ══════════════════════════════════════════════════ -->
<div id="about-overlay" style="
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0);
  pointer-events:none;
  transition:background 0.5s;
"></div>

<div id="about-panel" style="
  position:fixed;top:0;right:-520px;bottom:0;width:min(520px,100vw);z-index:201;
  background:linear-gradient(170deg,#06040f 0%,#0a0618 40%,#060410 100%);
  border-left:1px solid rgba(201,168,76,0.18);
  overflow-y:auto;
  transition:right 0.45s cubic-bezier(0.4,0,0.2,1);
  padding:0 0 64px;
  box-shadow:-16px 0 60px rgba(0,0,0,0.8), -2px 0 0 rgba(201,168,76,0.06);
">

  <!-- Starfield canvas inside panel -->
  <canvas id="about-stars" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.6;"></canvas>

  <!-- Sticky header -->
  <div style="
    position:sticky;top:0;z-index:2;
    background:linear-gradient(to bottom,rgba(6,4,15,0.98) 70%,transparent);
    padding:22px 32px 14px;
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid rgba(201,168,76,0.1);
  ">
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="color:rgba(201,168,76,0.5);font-size:10px;">✦</span>
      <span style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.35em;text-transform:uppercase;color:rgba(201,168,76,0.6);">About me - Antoine Dedieu</span>
      <span style="color:rgba(201,168,76,0.5);font-size:10px;">✦</span>
    </div>
    <button id="about-close" style="
      width:30px;height:30px;border-radius:50%;
      border:1px solid rgba(201,168,76,0.2);
      background:rgba(201,168,76,0.04);
      color:rgba(201,168,76,0.5);cursor:pointer;
      font-size:14px;display:flex;align-items:center;justify-content:center;
      transition:all 0.3s;font-family:'Cinzel',serif;
    " onmouseover="this.style.borderColor='rgba(201,168,76,0.6)';this.style.color='#c9a84c';this.style.background='rgba(201,168,76,0.1)'"
       onmouseout="this.style.borderColor='rgba(201,168,76,0.2)';this.style.color='rgba(201,168,76,0.5)';this.style.background='rgba(201,168,76,0.04)'">✕</button>
  </div>

  <div style="position:relative;z-index:1;">

    <!-- Avatar + name -->
    <div style="padding:32px 32px 28px;text-align:center;border-bottom:1px solid rgba(201,168,76,0.1);">

      <!-- Ornamental ring around avatar -->
      <div style="position:relative;width:110px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;">
        <div style="
          width:110px;height:110px;border-radius:50%;
          border:1px solid rgba(201,168,76,0.3);
          display:flex;align-items:center;justify-content:center;
          position:relative;
          box-shadow:0 0 30px rgba(201,168,76,0.08), inset 0 0 20px rgba(0,0,0,0.5);
          background:radial-gradient(circle at 35% 30%,rgba(201,168,76,0.08),rgba(0,0,0,0.6));
        ">
          <!-- Corner ornaments -->
          <span style="position:absolute;top:-6px;left:50%;transform:translateX(-50%);color:rgba(201,168,76,0.6);font-size:10px;">✦</span>
          <span style="position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);color:rgba(201,168,76,0.6);font-size:10px;">✦</span>
          <div id="about-avatar" style="font-size:3rem;filter:drop-shadow(0 0 12px rgba(201,168,76,0.4));width:90px;height:90px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;"></div>
        </div>
      </div>

      <div id="about-name" style="
        font-family:'Cinzel Decorative',serif;font-size:20px;font-weight:700;
        background:linear-gradient(135deg,#7a6330,#e8cc7a,#c9a84c);
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        margin-bottom:8px;line-height:1.2;
      ">First Last</div>

      <div id="about-titre" style="
        font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.18em;
        color:rgba(201,168,76,0.7);text-transform:uppercase;margin-bottom:6px;
      "></div>
      <div id="about-institution" style="font-family:'EB Garamond',Georgia,serif;font-size:15px;color:rgba(154,138,106,0.85);"></div>

      <!-- Ornament -->
      <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-top:18px;">
        <div style="width:40px;height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,0.3));"></div>
        <span style="color:rgba(201,168,76,0.4);font-size:10px;">✦</span>
        <div style="width:40px;height:1px;background:linear-gradient(to left,transparent,rgba(201,168,76,0.3));"></div>
      </div>
    </div>

    <!-- Contact -->
    <div style="padding:28px 32px;border-bottom:1px solid rgba(201,168,76,0.08);">
      <div style="
        font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.3em;
        color:rgba(201,168,76,0.45);text-transform:uppercase;margin-bottom:16px;
        display:flex;align-items:center;gap:10px;
      ">
        <span>Contact & Links</span>
        <div style="flex:1;height:1px;background:linear-gradient(to right,rgba(201,168,76,0.2),transparent);"></div>
      </div>
      <div id="about-links" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>

    <!-- At a Glance -->
    <div style="padding:28px 32px;border-bottom:1px solid rgba(201,168,76,0.08);">
      <div style="
        font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.3em;
        color:rgba(201,168,76,0.45);text-transform:uppercase;margin-bottom:16px;
        display:flex;align-items:center;gap:10px;
      ">
        <span>At a Glance</span>
        <div style="flex:1;height:1px;background:linear-gradient(to right,rgba(201,168,76,0.2),transparent);"></div>
      </div>
      <div id="about-infos" style="display:flex;flex-direction:column;gap:10px;"></div>
    </div>

    <!-- Bio -->
    <div style="padding:28px 32px;">
      <div style="
        font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.3em;
        color:rgba(201,168,76,0.45);text-transform:uppercase;margin-bottom:14px;
        display:flex;align-items:center;gap:10px;
      ">
        <span>Biography</span>
        <div style="flex:1;height:1px;background:linear-gradient(to right,rgba(201,168,76,0.2),transparent);"></div>
      </div>
      <div id="about-bio" style="
        font-family:'EB Garamond',Georgia,serif;
        font-size:17px;color:rgba(232,220,200,0.85);
        line-height:1.8;white-space:pre-line;
        border-left:2px solid rgba(201,168,76,0.2);
        padding-left:16px;
      "></div>
    </div>

  </div>
</div>

<style>
  #about-panel::-webkit-scrollbar{width:3px;}
  #about-panel::-webkit-scrollbar-track{background:transparent;}
  #about-panel::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.2);border-radius:2px;}
  #about-panel::-webkit-scrollbar-thumb:hover{background:rgba(201,168,76,0.4);}
</style>

<script>
(function() {
  const panel   = document.getElementById('about-panel');
  const overlay = document.getElementById('about-overlay');
  const btnOpen = document.getElementById('btn-about');
  const btnClose= document.getElementById('about-close');

  // ── Open / close ──
  function openAbout() {
    if(sc) resizeStars();
    panel.style.right        = '0';
    overlay.style.background = 'rgba(0,0,0,0.65)';
    overlay.style.pointerEvents = 'all';
  }
  function closeAbout() {
    panel.style.right        = '-520px';
    overlay.style.background = 'rgba(0,0,0,0)';
    overlay.style.pointerEvents = 'none';
  }
  window.closeAbout = closeAbout;

  if(btnOpen)  btnOpen.addEventListener('click', openAbout);
  if(btnClose) btnClose.addEventListener('click', closeAbout);
  if(overlay)  overlay.addEventListener('click', closeAbout);
  document.addEventListener('keydown', e => { if(e.key==='Escape') closeAbout(); });

  // ── Starfield inside panel ──
  const sc   = document.getElementById('about-stars');
  const sctx = sc ? sc.getContext('2d') : null;
  let sW, sH, sStars = [], sT = 0;
  function resizeStars() {
    if(!sctx) return;
    sW = sc.width  = panel.offsetWidth;
    sH = sc.height = Math.max(panel.scrollHeight, window.innerHeight);
    sStars = [];
    for(let i=0;i<80;i++) sStars.push({
      x:Math.random()*sW, y:Math.random()*sH,
      r:Math.random()*0.9+0.1, a:Math.random()*0.35+0.05,
      sp:Math.random()*0.003+0.001, ph:Math.random()*Math.PI*2,
    });
  }
  function drawStars() {
    if(!sctx) return;
    sT += 0.016;
    sctx.clearRect(0,0,sW,sH);
    for(const s of sStars) {
      const al = s.a*(0.4+0.6*Math.sin(sT*s.sp*60+s.ph));
      sctx.beginPath(); sctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      sctx.fillStyle = `rgba(255,255,220,${al})`; sctx.fill();
    }
    requestAnimationFrame(drawStars);
  }
  resizeStars(); drawStars();

  // ── Populate from PROFIL ──
  if(typeof PROFIL === 'undefined') return;
  const P = PROFIL;
  const setT = (id,v) => { const el=document.getElementById(id); if(el) el.textContent=v; };

  setT('about-name', P.prenom + ' ' + P.nom);
  setT('about-titre', P.titre);
  setT('about-institution', P.institution);
  setT('about-bio', P.bio_longue);

  const avatarEl = document.getElementById('about-avatar');
  if(avatarEl) {
    if(P.avatar_photo) {
      avatarEl.innerHTML = `<img src="${P.avatar_photo}" alt="${P.prenom}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
      avatarEl.style.fontSize = '0';
    } else {
      avatarEl.textContent = P.avatar_emoji;
    }
  }

  // At a Glance
  const infosEl = document.getElementById('about-infos');
  if(infosEl && P.infos) {
    infosEl.innerHTML = P.infos.map(({label, value}) => `
      <div style="
        display:flex;align-items:baseline;gap:12px;
        padding:10px 14px;border-radius:8px;
        background:linear-gradient(160deg,rgba(201,168,76,0.04),rgba(0,0,0,0.2));
        border:1px solid rgba(201,168,76,0.12);
      ">
        <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.1em;
          text-transform:uppercase;color:rgba(201,168,76,0.6);white-space:nowrap;">${label}</div>
        <div style="font-family:'EB Garamond',Georgia,serif;font-size:16px;color:rgba(232,220,200,0.9);">${value}</div>
      </div>`).join('');
  }

  // Links
  const linksEl = document.getElementById('about-links');
  if(linksEl && P.contact) {
    const icons = {
      email:    { icon:'✉', label:'Email' },
      linkedin: { icon:'in', label:'LinkedIn' },
      github:   { icon:'⌥', label:'GitHub' },
      twitter:  { icon:'✗', label:'Twitter / X' },
      scholar:  { icon:'✦', label:'Google Scholar' },
      cv:       { icon:'↓', label:'Download CV' },
    };
    linksEl.innerHTML = Object.entries(P.contact)
      .filter(([,v]) => v && v !== '#')
      .map(([k,v]) => {
        const {icon,label} = icons[k]||{icon:'→',label:k};
        const href = k==='email' ? 'mailto:'+v : v;
        const display = k==='email' ? v : v.replace('https://','').replace('http://','');
        return `<a href="${href}" target="_blank" rel="noopener" style="
          display:flex;align-items:center;gap:14px;
          padding:12px 16px;border-radius:8px;
          background:linear-gradient(160deg,rgba(201,168,76,0.04),rgba(0,0,0,0.2));
          border:1px solid rgba(201,168,76,0.12);
          color:rgba(232,220,200,0.8);text-decoration:none;
          transition:all 0.3s;
        "
        onmouseover="this.style.borderColor='rgba(201,168,76,0.4)';this.style.background='linear-gradient(160deg,rgba(201,168,76,0.1),rgba(0,0,0,0.2))';this.style.color='#e8cc7a'"
        onmouseout="this.style.borderColor='rgba(201,168,76,0.12)';this.style.background='linear-gradient(160deg,rgba(201,168,76,0.04),rgba(0,0,0,0.2))';this.style.color='rgba(232,220,200,0.8)'">
          <div style="
            width:32px;height:32px;border-radius:50%;flex-shrink:0;
            border:1px solid rgba(201,168,76,0.25);
            background:rgba(201,168,76,0.06);
            display:flex;align-items:center;justify-content:center;
            font-family:'Cinzel',serif;font-size:11px;color:rgba(201,168,76,0.7);
          ">${icon}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(201,168,76,0.6);margin-bottom:2px;">${label}</div>
            <div style="font-family:'EB Garamond',Georgia,serif;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:0.8;">${display}</div>
          </div>
          <span style="color:rgba(201,168,76,0.3);font-size:12px;">→</span>
        </a>`;
      }).join('');
  }

  // Hero name injection (index.html only)
  const nameEl = document.getElementById('hero-name');
  const bioEl  = document.getElementById('hero-bio');
  const avatarInitials = document.getElementById('avatar-initials');
  if(nameEl) nameEl.textContent = P.prenom + ' ' + P.nom;
  if(bioEl)  bioEl.textContent  = P.bio_courte;
  if(avatarInitials) avatarInitials.textContent = (P.prenom[0]||'') + (P.nom[0]||'');
})();

// ── HAMBURGER NAV ──
(function(){
  const hamburger = document.getElementById('navHamburger');
  const navLinks  = document.getElementById('navLinks');
  if(!hamburger || !navLinks) return;
  function toggleMenu(open) {
    hamburger.classList.toggle('open', open);
    navLinks.classList.toggle('open', open);
    hamburger.setAttribute('aria-expanded', String(open));
  }
  hamburger.addEventListener('click', () => toggleMenu(!navLinks.classList.contains('open')));
  navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => toggleMenu(false)));
  document.addEventListener('keydown', e => { if(e.key==='Escape') toggleMenu(false); });
})();
</script>

</html>
  <script src="js/effects.js"></script>
</body>
</html>
