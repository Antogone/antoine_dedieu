<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cauldron — Brew Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06080a;
      --gold: #c9a84c;
      --gold-light: #e8cc7a;
      --gold-dim: #7a6330;
      --green: #1db954;
      --green-dim: #0d5c2a;
      --text: #e8dcc8;
      --text-dim: #9a8a6a;
      --border: rgba(201,168,76,0.2);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 40px;
    }

    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(20px, 4vw, 36px);
      font-weight: 900;
      background: linear-gradient(135deg, #0a2a14 0%, #1db954 35%, #3dda6f 55%, #0d5c2a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(29,185,84,0.2));
      text-align: center;
    }
    .sub { font-size: 14px; font-style: italic; color: var(--text-dim); text-align: center; margin-top: -28px; }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      gap: 48px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ── INGREDIENTS PANEL ── */
    .ingredients-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 200px;
    }
    .panel-label {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--gold-dim);
      text-transform: uppercase;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .ingredient {
      background: rgba(0,0,0,0.45);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: grab;
      transition: all 0.2s;
      user-select: none;
    }
    .ingredient:hover { border-color: rgba(201,168,76,0.45); background: rgba(30,20,5,0.55); }
    .ingredient.dragging { opacity: 0.35; cursor: grabbing; }
    .ingredient.used { opacity: 0.3; filter: grayscale(0.6); pointer-events: none; }
    .ing-emoji { font-size: 22px; }
    .ing-name { font-family: 'Cinzel', serif; font-size: 12px; color: var(--text); }
    .ing-sub { font-size: 11px; font-style: italic; color: var(--text-dim); }

    /* ── CAULDRON AREA ── */
    .cauldron-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .cauldron-wrap { position: relative; width: 280px; }
    .cauldron-svg { width: 100%; filter: drop-shadow(0 8px 24px rgba(29,185,84,0.15)); }

    /* Drop zone */
    .cauldron-drop {
      position: absolute;
      top: 20%; left: 15%; width: 70%; height: 55%;
      border-radius: 50%;
      transition: background 0.3s;
    }
    .cauldron-drop.drag-over {
      background: rgba(29,185,84,0.08);
      box-shadow: 0 0 20px rgba(29,185,84,0.2) inset;
    }

    /* Floating ingredients inside cauldron */
    .cauldron-contents {
      position: absolute;
      top: 22%; left: 18%; width: 64%;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .cauldron-ing {
      font-size: 24px;
      animation: floatIng 2s ease-in-out infinite;
    }
    .cauldron-ing:nth-child(2) { animation-delay: 0.6s; }
    @keyframes floatIng {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* Steam */
    .steam {
      position: absolute;
      top: -24px; width: 100%;
      display: flex;
      justify-content: space-around;
      pointer-events: none;
    }
    .steam-line {
      width: 3px; height: 20px;
      background: linear-gradient(to top, rgba(29,185,84,0.4), transparent);
      border-radius: 2px;
      animation: steamRise 1.5s ease-in-out infinite;
    }
    .steam-line:nth-child(2) { animation-delay: 0.3s; height: 14px; }
    .steam-line:nth-child(3) { animation-delay: 0.6s; height: 18px; }
    @keyframes steamRise {
      0%, 100% { transform: translateY(0) scaleX(1); opacity: 0.5; }
      50%       { transform: translateY(-10px) scaleX(1.5); opacity: 0.8; }
    }

    /* Buttons */
    .btn-brew {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--bg);
      background: linear-gradient(135deg, var(--green-dim), var(--green));
      border: none;
      padding: 12px 32px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(29,185,84,0.25);
    }
    .btn-brew:hover { box-shadow: 0 4px 28px rgba(29,185,84,0.45); transform: translateY(-1px); }
    .btn-brew:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-clear {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      color: var(--text-dim);
      background: none;
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-clear:hover { color: var(--gold); border-color: var(--gold); }

    .brew-hint {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--gold-dim);
      text-transform: uppercase;
    }

    /* ══════════════════════════════════════════
       BREW OVERLAY — top-down mixing bowl
    ══════════════════════════════════════════ */
    .brew-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }
    .brew-overlay.open { opacity: 1; pointer-events: all; }

    .brew-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 22px;
      background: linear-gradient(135deg, var(--green-dim), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brew-instruction {
      font-size: 14px;
      font-style: italic;
      color: var(--text-dim);
      text-align: center;
      max-width: 300px;
    }

    /* The interactive mixing bowl container */
    .mixing-bowl-wrap {
      position: relative;
      width: 280px;
      height: 280px;
      cursor: none;
    }

    /* Custom cursor dot */
    .cursor-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #3dda6f;
      box-shadow: 0 0 10px #1db954, 0 0 20px rgba(29,185,84,0.5);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 10;
      opacity: 0;
      transition: opacity 0.2s;
    }

    /* Trail canvas sits inside wrap */
    #trailCanvas {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
    }

    /* Progress indicator */
    .circle-progress {
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .circle-pip {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 1.5px solid var(--green-dim);
      background: transparent;
      transition: all 0.3s;
    }
    .circle-pip.done {
      background: var(--green);
      border-color: var(--green);
      box-shadow: 0 0 8px rgba(29,185,84,0.6);
    }

    .progress-label {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--gold-dim);
      text-transform: uppercase;
    }

    /* Success state */
    .success-msg {
      font-family: 'Cinzel Decorative', serif;
      font-size: 18px;
      background: linear-gradient(135deg, var(--green-dim), var(--green), #3dda6f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .success-msg.show { opacity: 1; transform: scale(1); }

    .btn-close-brew {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      color: var(--text-dim);
      background: none;
      border: 1px solid var(--border);
      padding: 9px 24px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
      opacity: 0;
      pointer-events: none;
      transition: all 0.35s;
    }
    .btn-close-brew.show { opacity: 1; pointer-events: all; }
    .btn-close-brew:hover { color: var(--green); border-color: var(--green); }

    /* SVG animations */
    @keyframes glowPulse {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(29,185,84,0.35)); }
      50%       { filter: drop-shadow(0 0 22px rgba(29,185,84,0.7)); }
    }
    @keyframes bubbleFloat {
      0%   { transform: translateY(0); opacity: 0.8; }
      100% { transform: translateY(-50px); opacity: 0; }
    }
    @keyframes outerRingSpin  { from { transform: rotate(0deg);   } to { transform: rotate(360deg);  } }
    @keyframes innerRingSpin  { from { transform: rotate(0deg);   } to { transform: rotate(-360deg); } }
    @keyframes runeGlow {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 0.9; }
    }
    @keyframes topdownBubble {
      0%   { transform: scale(0); opacity: 0.9; }
      100% { transform: scale(3); opacity: 0; }
    }
    @keyframes vortexSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<h1>✦ The Cauldron ✦</h1>
<p class="sub">Drag ingredients in, then brew the potion</p>

<div class="layout">

  <!-- ── INGREDIENTS ── -->
  <div class="ingredients-panel">
    <div class="panel-label">⚗ Ingredients</div>

    <div class="ingredient" id="ing-fire" draggable="true"
         ondragstart="onDragStart(event,'fire')">
      <span class="ing-emoji">🔥</span>
      <div>
        <div class="ing-name">Emberroot</div>
        <div class="ing-sub">Fire & energy</div>
      </div>
    </div>

    <div class="ingredient" id="ing-herb" draggable="true"
         ondragstart="onDragStart(event,'herb')">
      <span class="ing-emoji">🌿</span>
      <div>
        <div class="ing-name">Moonsage</div>
        <div class="ing-sub">Growth & life</div>
      </div>
    </div>
  </div>

  <!-- ── CAULDRON ── -->
  <div class="cauldron-area">
    <div class="cauldron-wrap">

      <!-- Steam (hidden until ingredient added) -->
      <div class="steam" id="steam" style="display:none">
        <div class="steam-line"></div>
        <div class="steam-line"></div>
        <div class="steam-line"></div>
      </div>

      <!-- Option A SVG -->
      <svg class="cauldron-svg" viewBox="0 0 300 260" xmlns="http://www.w3.org/2000/svg" style="animation:glowPulse 3s ease-in-out infinite">
        <defs>
          <radialGradient id="liquidA" cx="50%" cy="45%" r="55%">
            <stop offset="0%" stop-color="#3dda6f" stop-opacity="0.9"/>
            <stop offset="60%" stop-color="#1db954" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#062010" stop-opacity="0.8"/>
          </radialGradient>
          <radialGradient id="bodyA" cx="35%" cy="25%" r="80%">
            <stop offset="0%" stop-color="#1e1e22"/>
            <stop offset="60%" stop-color="#111115"/>
            <stop offset="100%" stop-color="#080810"/>
          </radialGradient>
          <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#1db954" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#1db954" stop-opacity="0"/>
          </radialGradient>
          <filter id="greenGlowA">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Feet -->
        <path d="M95 218 L82 248" stroke="#222228" stroke-width="14" stroke-linecap="round"/>
        <path d="M95 218 L82 248" stroke="#c9a84c" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
        <path d="M205 218 L218 248" stroke="#222228" stroke-width="14" stroke-linecap="round"/>
        <path d="M205 218 L218 248" stroke="#c9a84c" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
        <path d="M150 222 L150 248" stroke="#222228" stroke-width="12" stroke-linecap="round"/>
        <!-- Glow beneath -->
        <ellipse cx="150" cy="240" rx="70" ry="8" fill="url(#glowA)"/>
        <!-- Body -->
        <path d="M38 92 Q32 190 150 212 Q268 190 262 92 Z" fill="url(#bodyA)"/>
        <!-- Rune engravings -->
        <path d="M70 130 L80 120 L90 130 L80 140 Z" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.35"/>
        <path d="M210 130 L220 120 L230 130 L220 140 Z" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.35"/>
        <text x="150" y="175" text-anchor="middle" font-size="11" fill="#c9a84c" opacity="0.25" font-family="serif">ᚠ ᚢ ᚦ ᚨ ᚱ</text>
        <path d="M68 148 Q150 158 232 148" stroke="#c9a84c" stroke-width="0.8" fill="none" opacity="0.2"/>
        <!-- Reflection -->
        <path d="M50 118 Q48 172 88 196" stroke="#2a2a30" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
        <!-- Liquid surface -->
        <ellipse cx="150" cy="98" rx="102" ry="20" id="liquidSurfaceA" fill="url(#liquidA)" filter="url(#greenGlowA)"/>
        <!-- Ornate rim -->
        <ellipse cx="150" cy="92" rx="112" ry="24" fill="none" stroke="#c9a84c" stroke-width="2.5" opacity="0.6"/>
        <circle cx="75"  cy="90" r="3" fill="#c9a84c" opacity="0.5"/>
        <circle cx="150" cy="68" r="3" fill="#c9a84c" opacity="0.5"/>
        <circle cx="225" cy="90" r="3" fill="#c9a84c" opacity="0.5"/>
        <circle cx="150" cy="116" r="3" fill="#c9a84c" opacity="0.3"/>
        <path d="M110 70 L114 74 L110 78 L106 74 Z" fill="#c9a84c" opacity="0.4"/>
        <path d="M190 70 L194 74 L190 78 L186 74 Z" fill="#c9a84c" opacity="0.4"/>
        <!-- Forged handles -->
        <path d="M38 128 Q14 94 38 68" stroke="#1e1e22" stroke-width="12" fill="none" stroke-linecap="round"/>
        <path d="M38 128 Q14 94 38 68" stroke="#c9a84c" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
        <path d="M262 128 Q286 94 262 68" stroke="#1e1e22" stroke-width="12" fill="none" stroke-linecap="round"/>
        <path d="M262 128 Q286 94 262 68" stroke="#c9a84c" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
        <circle cx="26"  cy="94" r="5" fill="#1a1a20" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
        <circle cx="274" cy="94" r="5" fill="#1a1a20" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
        <!-- Highlight -->
        <path d="M62 102 Q90 88 130 93" stroke="#3a3a44" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
        <!-- Bubbles -->
        <circle cx="130" cy="90" r="4" fill="#3dda6f" opacity="0" style="animation:bubbleFloat 2.2s ease-in 0.4s infinite"/>
        <circle cx="165" cy="86" r="3" fill="#3dda6f" opacity="0" style="animation:bubbleFloat 1.8s ease-in 1.1s infinite"/>
        <circle cx="148" cy="94" r="5" fill="#1db954" opacity="0" style="animation:bubbleFloat 2.5s ease-in 0s infinite"/>
      </svg>

      <!-- Drop zone -->
      <div class="cauldron-drop" id="cauldronDrop"
           ondragover="onDragOver(event)"
           ondragleave="onDragLeave(event)"
           ondrop="onDrop(event)">
        <div class="cauldron-contents" id="cauldronContents"></div>
      </div>
    </div>

    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn-brew" id="btnBrew" onclick="openBrewOverlay()" disabled>🧪 Brew the potion</button>
      <button class="btn-clear" onclick="clearCauldron()">↺ Clear</button>
    </div>
    <div class="brew-hint" id="brewHint">Drag ingredients here</div>
  </div>

</div>


<!-- ══════════════════════════════════════════
     BREW OVERLAY
══════════════════════════════════════════ -->
<div class="brew-overlay" id="brewOverlay">

  <div class="brew-title">✦ Mix the Brew ✦</div>
  <p class="brew-instruction" id="brewInstruction">Hold & drag in circles to stir the cauldron</p>

  <!-- Top-down mixing bowl -->
  <div class="mixing-bowl-wrap" id="mixingBowlWrap">
    <div class="cursor-dot" id="cursorDot"></div>
    <canvas id="trailCanvas" width="280" height="280"></canvas>

    <!-- Top-down SVG bowl (Option B style) -->
    <svg width="280" height="280" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0">
      <defs>
        <radialGradient id="outerRimB" cx="50%" cy="50%" r="50%">
          <stop offset="75%" stop-color="#1a1a1e"/>
          <stop offset="100%" stop-color="#111114"/>
        </radialGradient>
        <radialGradient id="liquidB" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#3dda6f" stop-opacity="0.95"/>
          <stop offset="40%"  stop-color="#1db954" stop-opacity="0.7"/>
          <stop offset="80%"  stop-color="#0a3018" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#041008" stop-opacity="1"/>
        </radialGradient>
        <radialGradient id="vortexCenter" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#7fffaa" stop-opacity="1"/>
          <stop offset="50%"  stop-color="#1db954" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#1db954" stop-opacity="0"/>
        </radialGradient>
        <filter id="glowB">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Outer ornate rim -->
      <circle cx="110" cy="110" r="106" fill="url(#outerRimB)"/>
      <circle cx="110" cy="110" r="106" fill="none" stroke="#c9a84c" stroke-width="3" opacity="0.5"/>
      <!-- 8 rim ornaments -->
      <circle cx="110" cy="4"   r="4" fill="#c9a84c" opacity="0.6"/>
      <circle cx="185" cy="29"  r="3" fill="#c9a84c" opacity="0.45"/>
      <circle cx="216" cy="110" r="4" fill="#c9a84c" opacity="0.6"/>
      <circle cx="185" cy="191" r="3" fill="#c9a84c" opacity="0.45"/>
      <circle cx="110" cy="216" r="4" fill="#c9a84c" opacity="0.6"/>
      <circle cx="35"  cy="191" r="3" fill="#c9a84c" opacity="0.45"/>
      <circle cx="4"   cy="110" r="4" fill="#c9a84c" opacity="0.6"/>
      <circle cx="35"  cy="29"  r="3" fill="#c9a84c" opacity="0.45"/>
      <!-- Inner wall -->
      <circle cx="110" cy="110" r="96" fill="#0e0e12"/>
      <circle cx="110" cy="110" r="96" fill="none" stroke="#222226" stroke-width="4"/>
      <!-- Liquid -->
      <circle cx="110" cy="110" r="90" fill="url(#liquidB)"/>

      <!-- Vortex group — spins faster as user stirs -->
      <g id="vortexGroup" style="transform-origin:110px 110px">
        <path d="M110 110 Q135 80 160 110 Q185 140 160 170 Q135 200 110 170 Q85 140 110 80 Q135 20 170 50"
              fill="none" stroke="#3dda6f" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
        <path d="M110 110 Q90 75 65 95 Q40 115 60 140 Q80 165 110 150 Q140 135 150 110 Q160 85 140 65 Q120 45 90 55"
              fill="none" stroke="#1db954" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
      </g>

      <!-- Concentric rings -->
      <circle cx="110" cy="110" r="65" fill="none" stroke="#1db954" stroke-width="0.8" opacity="0.2"/>
      <circle cx="110" cy="110" r="42" fill="none" stroke="#1db954" stroke-width="0.8" opacity="0.25"/>
      <circle cx="110" cy="110" r="22" fill="none" stroke="#3dda6f" stroke-width="1"   opacity="0.35"/>

      <!-- Glowing core -->
      <circle cx="110" cy="110" r="14" fill="url(#vortexCenter)" filter="url(#glowB)"/>
      <circle cx="110" cy="110" r="6"  fill="#7fffaa" opacity="0.9"/>

      <!-- Surface bubbles -->
      <circle cx="140" cy="82"  r="4" fill="none" stroke="#3dda6f" stroke-width="1" opacity="0" style="animation:topdownBubble 2.5s ease-out 0.5s infinite"/>
      <circle cx="80"  cy="130" r="3" fill="none" stroke="#3dda6f" stroke-width="1" opacity="0" style="animation:topdownBubble 2s ease-out 1.2s infinite"/>
      <circle cx="120" cy="145" r="5" fill="none" stroke="#1db954" stroke-width="1" opacity="0" style="animation:topdownBubble 3s ease-out 0s infinite"/>
      <circle cx="90"  cy="75"  r="3" fill="none" stroke="#3dda6f" stroke-width="1" opacity="0" style="animation:topdownBubble 2.2s ease-out 1.8s infinite"/>

      <!-- Rune labels -->
      <text x="110" y="18"  text-anchor="middle" font-size="9" fill="#c9a84c" opacity="0.5" font-family="serif">ᚠ</text>
      <text x="192" y="114" text-anchor="middle" font-size="9" fill="#c9a84c" opacity="0.5" font-family="serif">ᚢ</text>
      <text x="110" y="208" text-anchor="middle" font-size="9" fill="#c9a84c" opacity="0.5" font-family="serif">ᚦ</text>
      <text x="28"  y="114" text-anchor="middle" font-size="9" fill="#c9a84c" opacity="0.5" font-family="serif">ᚨ</text>
    </svg>
  </div>

  <!-- Progress pips -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
    <div class="progress-label">Circles stirred</div>
    <div class="circle-progress">
      <div class="circle-pip" id="pip1"></div>
      <div class="circle-pip" id="pip2"></div>
    </div>
  </div>

  <!-- Success -->
  <div class="success-msg" id="successMsg">✦ Potion Brewed! ✦</div>
  <button class="btn-close-brew" id="btnCloseBrew" onclick="closeBrewOverlay()">Continue →</button>

</div>


<script>
/* ═══════════════════════════
   DRAG & DROP
═══════════════════════════ */
const INGREDIENTS = {
  fire: { emoji: '🔥', name: 'Emberroot' },
  herb: { emoji: '🌿', name: 'Moonsage'  }
};
let inCauldron = [];

function onDragStart(e, id) {
  if (inCauldron.includes(id)) { e.preventDefault(); return; }
  e.dataTransfer.setData('text/plain', id);
  document.getElementById('ing-' + id).classList.add('dragging');
}
document.addEventListener('dragend', () => {
  document.querySelectorAll('.ingredient').forEach(el => el.classList.remove('dragging'));
});

function onDragOver(e) {
  e.preventDefault();
  document.getElementById('cauldronDrop').classList.add('drag-over');
}
function onDragLeave(e) {
  document.getElementById('cauldronDrop').classList.remove('drag-over');
}
function onDrop(e) {
  e.preventDefault();
  document.getElementById('cauldronDrop').classList.remove('drag-over');
  const id = e.dataTransfer.getData('text/plain');
  if (!id || inCauldron.includes(id) || inCauldron.length >= 2) return;
  addToCauldron(id);
}

function addToCauldron(id) {
  inCauldron.push(id);
  const ing = INGREDIENTS[id];

  // Mark ingredient as used
  document.getElementById('ing-' + id).classList.add('used');

  // Show in cauldron
  const contents = document.getElementById('cauldronContents');
  const span = document.createElement('span');
  span.className = 'cauldron-ing';
  span.textContent = ing.emoji;
  contents.appendChild(span);

  // Show steam
  document.getElementById('steam').style.display = 'flex';

  // Update hint & button
  const hint = document.getElementById('brewHint');
  if (inCauldron.length === 1) {
    hint.textContent = 'Add one more ingredient…';
  } else {
    hint.textContent = 'Ready to brew!';
    document.getElementById('btnBrew').disabled = false;
  }
}

function clearCauldron() {
  inCauldron = [];
  document.getElementById('cauldronContents').innerHTML = '';
  document.getElementById('steam').style.display = 'none';
  document.getElementById('btnBrew').disabled = true;
  document.getElementById('brewHint').textContent = 'Drag ingredients here';
  document.querySelectorAll('.ingredient').forEach(el => el.classList.remove('used'));
}


/* ═══════════════════════════
   BREW OVERLAY
═══════════════════════════ */
function openBrewOverlay() {
  resetMixing();
  document.getElementById('brewOverlay').classList.add('open');
}
function closeBrewOverlay() {
  document.getElementById('brewOverlay').classList.remove('open');
  clearCauldron();
}


/* ═══════════════════════════
   CIRCLE GESTURE DETECTION
═══════════════════════════ */
const REQUIRED_CIRCLES = 2;
const TWO_PI = Math.PI * 2;

let isStirring   = false;
let totalAngle   = 0;   // cumulative radians swept
let lastAngle    = null;
let circlesDone  = 0;
let vortexAngle  = 0;
let animFrameId  = null;
let trailPoints  = [];

const canvas     = document.getElementById('trailCanvas');
const ctx        = canvas.getContext('2d');
const bowlWrap   = document.getElementById('mixingBowlWrap');
const cursorDot  = document.getElementById('cursorDot');
const vortexGrp  = document.getElementById('vortexGroup');

function getBowlCenter() {
  const rect = bowlWrap.getBoundingClientRect();
  return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2, r: rect.width / 2 };
}

function getAngle(cx, cy, mx, my) {
  return Math.atan2(my - cy, mx - cx);
}

function angleDelta(prev, curr) {
  // Shortest signed difference, in range [-π, π]
  let d = curr - prev;
  while (d >  Math.PI) d -= TWO_PI;
  while (d < -Math.PI) d += TWO_PI;
  return d;
}

function resetMixing() {
  isStirring  = false;
  totalAngle  = 0;
  lastAngle   = null;
  circlesDone = 0;
  vortexAngle = 0;
  trailPoints = [];
  clearCanvas();
  document.getElementById('pip1').classList.remove('done');
  document.getElementById('pip2').classList.remove('done');
  document.getElementById('successMsg').classList.remove('show');
  document.getElementById('btnCloseBrew').classList.remove('show');
  document.getElementById('brewInstruction').textContent = 'Hold & drag in circles to stir the cauldron';
  vortexGrp.style.transform = 'rotate(0deg)';
  cursorDot.style.opacity = '0';
}

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function drawTrail() {
  clearCanvas();
  if (trailPoints.length < 2) return;
  const rect = bowlWrap.getBoundingClientRect();

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  for (let i = 1; i < trailPoints.length; i++) {
    const t = i / trailPoints.length;                // 0→1
    const alpha = t * 0.7;
    const width = 2 + t * 4;
    const hue   = 140 + t * 40;                      // green spectrum

    ctx.beginPath();
    ctx.strokeStyle = `hsla(${hue}, 80%, 55%, ${alpha})`;
    ctx.lineWidth = width;

    const px = trailPoints[i-1].x - rect.left;
    const py = trailPoints[i-1].y - rect.top;
    const cx2 = trailPoints[i].x  - rect.left;
    const cy2 = trailPoints[i].y  - rect.top;
    ctx.moveTo(px, py);
    ctx.lineTo(cx2, cy2);
    ctx.stroke();
  }
  ctx.restore();
}

/* Keep trail length bounded */
const MAX_TRAIL = 80;

function onMouseMove(e) {
  const { x: cx, y: cy, r } = getBowlCenter();
  const mx = e.clientX;
  const my = e.clientY;

  // Show cursor dot inside bowl area
  const dist = Math.hypot(mx - cx, my - cy);
  if (dist < r * 0.92) {
    const rect = bowlWrap.getBoundingClientRect();
    cursorDot.style.left = (mx - rect.left) + 'px';
    cursorDot.style.top  = (my - rect.top)  + 'px';
    cursorDot.style.opacity = '1';
  } else {
    cursorDot.style.opacity = '0';
  }

  if (!isStirring || circlesDone >= REQUIRED_CIRCLES) return;

  const angle = getAngle(cx, cy, mx, my);

  if (lastAngle !== null) {
    const delta = angleDelta(lastAngle, angle);
    totalAngle += delta;

    // Spin the vortex proportionally
    vortexAngle += delta * (180 / Math.PI);
    vortexGrp.style.transform = `rotate(${vortexAngle}deg)`;

    // Check completed circles (counted in both directions)
    const newDone = Math.floor(Math.abs(totalAngle) / TWO_PI);
    if (newDone > circlesDone) {
      circlesDone = newDone;
      if (circlesDone >= 1) document.getElementById('pip1').classList.add('done');
      if (circlesDone >= 2) document.getElementById('pip2').classList.add('done');

      if (circlesDone >= REQUIRED_CIRCLES) onBrewComplete();
    }
  }
  lastAngle = angle;

  // Trail
  trailPoints.push({ x: mx, y: my });
  if (trailPoints.length > MAX_TRAIL) trailPoints.shift();
  drawTrail();
}

function onMouseDown(e) {
  const { x: cx, y: cy, r } = getBowlCenter();
  const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
  if (dist > r * 0.92) return; // only inside bowl

  isStirring = true;
  lastAngle  = getAngle(cx, cy, e.clientX, e.clientY);
  trailPoints = [];
  document.getElementById('brewInstruction').textContent = 'Keep stirring…';
}

function onMouseUp() {
  isStirring = false;
  if (circlesDone < REQUIRED_CIRCLES) {
    // fade trail out
    fadeTrail();
  }
}

function fadeTrail() {
  let opacity = 1;
  function step() {
    opacity -= 0.06;
    if (opacity <= 0) { clearCanvas(); trailPoints = []; return; }
    ctx.globalAlpha = opacity;
    drawTrail();
    ctx.globalAlpha = 1;
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function onBrewComplete() {
  isStirring = false;
  clearCanvas();
  trailPoints = [];

  // Flash vortex
  vortexGrp.style.transition = 'transform 0.5s ease-out';
  setTimeout(() => { vortexGrp.style.transition = ''; }, 500);

  document.getElementById('successMsg').classList.add('show');
  document.getElementById('btnCloseBrew').classList.add('show');
  document.getElementById('brewInstruction').textContent = '✦ The potion is ready ✦';
  cursorDot.style.opacity = '0';
}

// Attach listeners
document.getElementById('mixingBowlWrap').addEventListener('mousedown',  onMouseDown);
document.addEventListener('mousemove', onMouseMove);
document.addEventListener('mouseup',   onMouseUp);

// Close overlay on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeBrewOverlay();
});
</script>
</body>
</html>
