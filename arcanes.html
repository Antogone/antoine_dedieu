<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcana — Full List</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#080810;--bg2:#0d0d1a;
      --gold:#c9a84c;--gold-light:#e8cc7a;--gold-dim:#7a6330;
      --text:#e8dcc8;--text-dim:#9a8a6a;
      --border:rgba(201,168,76,0.25);--glow:rgba(201,168,76,0.15);
      --card-w:140px;--card-h:245px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'EB Garamond',Georgia,serif;min-height:100vh;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;z-index:0;
      background:radial-gradient(ellipse at 20% 20%,rgba(160,40,30,0.12) 0%,transparent 50%),
        radial-gradient(ellipse at 80% 80%,rgba(160,40,30,0.08) 0%,transparent 50%);pointer-events:none;}

    /* NAV */

    /* PAGE */
    .page{padding:96px 48px 80px;position:relative;z-index:1;}

    /* Titre page */
    .page-header{text-align:center;margin-bottom:60px;}
    .page-eyebrow{font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.3em;
      color:var(--gold-dim);text-transform:uppercase;margin-bottom:12px;}
    .page-title{font-family:'Cinzel Decorative',serif;font-size:clamp(28px,5vw,52px);font-weight:900;
      background:linear-gradient(135deg,#8b1a1a 0%,#e74c3c 35%,#ff6b5b 55%,#c0392b 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      line-height:1.1;filter:drop-shadow(0 0 28px rgba(231,76,60,0.35));}
    .ornament{display:flex;align-items:center;justify-content:center;gap:14px;margin:20px 0 0;}
    .ornament::before,.ornament::after{content:'';width:60px;height:1px;background:linear-gradient(to right,transparent,var(--gold-dim));}
    .ornament::after{background:linear-gradient(to left,transparent,var(--gold-dim));}

    /* Category filters */
    .filter-bar{display:flex;justify-content:center;gap:12px;margin-bottom:48px;flex-wrap:wrap;}
    .filter-btn{font-family:'Cinzel',serif;font-size:11px;font-weight:600;letter-spacing:0.1em;
      text-transform:uppercase;color:var(--text-dim);background:none;
      border:1px solid var(--border);padding:8px 22px;border-radius:20px;cursor:pointer;transition:all 0.3s;}
    .filter-btn:hover{color:var(--gold-light);border-color:rgba(201,168,76,0.4);}
    .filter-btn.active{color:var(--bg);background:linear-gradient(135deg,var(--gold-dim),var(--gold));
      border-color:transparent;box-shadow:0 4px 16px rgba(201,168,76,0.25);}

    /* Groupe d'arcanes */
    .arcane-group{margin-bottom:64px;}
    .group-header{display:flex;align-items:center;gap:20px;margin-bottom:28px;}
    .group-icon{font-size:20px;}
    .group-title{font-family:'Cinzel Decorative',serif;font-size:20px;font-weight:700;
      background:linear-gradient(135deg,var(--gold-dim),var(--gold-light));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .group-line{flex:1;height:1px;background:linear-gradient(to right,var(--gold-dim),transparent);}
    .group-count{font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.15em;
      color:var(--gold-dim);text-transform:uppercase;}

    /* Grille de cards tarot */
    .cards-row{display:flex;flex-wrap:wrap;gap:20px;justify-content:flex-start;}

    /* Carte tarot (mini version liste) */
    .arcane-card{width:var(--card-w);flex-shrink:0;cursor:pointer;
      animation:fadeIn 0.4s ease both;}
    .arcane-card:nth-child(1){animation-delay:0s;}
    .arcane-card:nth-child(2){animation-delay:0.05s;}
    .arcane-card:nth-child(3){animation-delay:0.1s;}
    .arcane-card:nth-child(4){animation-delay:0.15s;}
    .arcane-card:nth-child(5){animation-delay:0.2s;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

    .arcane-card-visual{width:100%;height:var(--card-h);border-radius:10px;
      border:2px solid var(--gold-dim);display:flex;flex-direction:column;overflow:hidden;
      box-shadow:0 6px 20px rgba(0,0,0,0.5);transition:transform 0.3s,box-shadow 0.3s,border-color 0.3s;
      position:relative;}
    .arcane-card-visual::before{content:'';position:absolute;inset:5px;
      border:1px solid rgba(201,168,76,0.12);border-radius:6px;pointer-events:none;z-index:1;}
    .arcane-card:hover .arcane-card-visual{
      transform:translateY(-10px) scale(1.03);
      box-shadow:0 18px 40px rgba(0,0,0,0.7),0 0 24px rgba(201,168,76,0.2);
      border-color:var(--gold);}
    .card-art{flex:1;display:flex;align-items:center;justify-content:center;position:relative;}
    .card-roman{position:absolute;top:8px;left:0;right:0;text-align:center;
      font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.15em;color:rgba(201,168,76,0.5);}
    .card-emoji{font-size:42px;filter:drop-shadow(0 0 8px rgba(201,168,76,0.25));}
    .card-footer{padding:8px 8px 10px;text-align:center;
      border-top:1px solid rgba(201,168,76,0.18);background:rgba(0,0,0,0.35);}
    .card-name{font-family:'Cinzel',serif;font-size:9px;font-weight:600;letter-spacing:0.08em;
      color:var(--gold);text-transform:uppercase;margin-bottom:2px;line-height:1.3;}
    .card-cat{font-size:9px;font-style:italic;color:var(--text-dim);}

    /* État hidden */
    .arcane-group.hidden{display:none;}

    /* MODALE (identique à tarot.html) */
    .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.85);
      backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity 0.4s;padding:24px;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal{background:linear-gradient(160deg,#12082a 0%,#1a0a2e 50%,#0d0d1a 100%);
      border:1px solid var(--gold-dim);border-radius:16px;max-width:660px;width:100%;
      max-height:88vh;overflow-y:auto;position:relative;
      box-shadow:0 24px 80px rgba(0,0,0,0.8),0 0 60px rgba(201,168,76,0.1);
      transform:scale(0.9) translateY(20px);transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);}
    .modal-overlay.open .modal{transform:scale(1) translateY(0);}
    .modal::before,.modal::after{content:'✦';position:absolute;color:var(--gold-dim);font-size:12px;}
    .modal::before{top:16px;left:20px;}.modal::after{bottom:16px;right:20px;}
    .modal-header{display:flex;gap:24px;padding:28px 28px 20px;border-bottom:1px solid var(--border);align-items:flex-end;}
    .modal-thumb{width:90px;height:155px;border-radius:8px;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;font-size:40px;
      border:2px solid var(--gold-dim);position:relative;}
    .modal-thumb img{object-fit:contain;display:block;width:64px;height:64px;}
    .modal-thumb::before{content:'';position:absolute;inset:4px;border:1px solid rgba(201,168,76,0.1);border-radius:4px;}
    .modal-meta{flex:1;}
    .modal-type{font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.25em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:6px;}
    .modal-title{font-family:'Cinzel Decorative',serif;font-size:clamp(18px,3vw,26px);font-weight:700;
      background:linear-gradient(135deg,var(--gold-dim),var(--gold-light));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;margin-bottom:8px;}
    .modal-subtitle{font-size:14px;color:var(--text-dim);}
    .modal-body{padding:24px 28px 28px;}
    .modal-prophecy{font-family:'EB Garamond',Georgia,serif;font-size:17px;color:var(--text);line-height:1.8;
      border-left:2px solid var(--gold-dim);padding-left:16px;margin-bottom:20px;}
    .modal-details{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
    .modal-detail{background:rgba(0,0,0,0.3);border:1px solid rgba(201,168,76,0.1);border-radius:6px;padding:12px;}
    .modal-detail-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.2em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:4px;}
    .modal-detail-value{font-size:14px;color:var(--text);}
    .modal-tags{display:flex;flex-wrap:wrap;gap:7px;}
    .modal-tag{font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.08em;color:var(--gold);
      border:1px solid rgba(201,168,76,0.3);padding:4px 12px;border-radius:20px;background:rgba(201,168,76,0.05);}
    .modal-close{position:absolute;top:14px;right:14px;background:rgba(0,0,0,0.5);
      border:1px solid var(--border);color:var(--text-dim);width:30px;height:30px;
      border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
    .modal-close:hover{color:var(--gold);border-color:var(--gold);}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:var(--bg);}
    ::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px;}
  
    /* ══════════════════════════════════════
       NAV — base tarot, accentuation arcanes
       ══════════════════════════════════════ */
    nav{
      position:fixed;top:0;left:0;right:0;z-index:100;height:64px;
      display:flex;align-items:center;justify-content:space-between;padding:0 48px;
      background:linear-gradient(to bottom,rgba(8,8,16,0.97),transparent);
      border-bottom:1px solid rgba(255,255,255,0.06);
      backdrop-filter:blur(12px);
    }
    /* Animated stars in nav */
    nav::before{
      content:'';position:absolute;inset:0;pointer-events:none;overflow:hidden;
      background:
        radial-gradient(1px 1px at 15% 40%, rgba(255,255,220,0.55) 0%, transparent 100%),
        radial-gradient(1px 1px at 28% 65%, rgba(255,255,220,0.35) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 42% 30%, rgba(255,255,220,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 70%, rgba(255,255,220,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 68% 45%, rgba(255,255,220,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 78% 25%, rgba(255,255,220,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 60%, rgba(255,255,220,0.35) 0%, transparent 100%);
      animation:navStarPulse 4s ease-in-out infinite;
    }
    nav::after{
      content:'';position:absolute;bottom:0;left:5%;right:5%;height:1px;
      background:linear-gradient(to right,transparent,#e74c3c,transparent);
      opacity:0.35;
    }
    @keyframes navStarPulse{
      0%,100%{opacity:0.6;}
      50%{opacity:1;}
    }
    .nav-logo{
      font-family:'Cinzel Decorative',serif;font-size:18px;font-weight:700;
      color:#e74c3c;letter-spacing:0.15em;
      text-shadow:0 0 20px rgba(201,168,76,0.4);
      position:relative;z-index:1;
      animation:logoGlow 3s ease-in-out infinite;
    }
    @keyframes logoGlow{
      0%,100%{text-shadow:0 0 20px rgba(231,76,60,0.15);}
      50%{text-shadow:0 0 28px rgba(201,168,76,0.4), 0 0 48px rgba(201,168,76,0.15);}
    }
    .nav-links{display:flex;gap:36px;list-style:none;position:relative;z-index:1;}
    .nav-links a{
      font-family:'Cinzel',serif;font-size:12px;font-weight:600;
      color:var(--text-dim);text-decoration:none;
      letter-spacing:0.1em;text-transform:uppercase;
      transition:color 0.3s;position:relative;
    }
    .nav-links a::after{
      content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;
      background:#e74c3c;
      transform:scaleX(0);transition:transform 0.3s;
    }
    .nav-links a:hover,.nav-links a.active{color:#ff6b5b;}
    .nav-links a:hover::after,.nav-links a.active::after{transform:scaleX(1);}
    .nav-back{
      font-family:'Cinzel',serif;font-size:11px;color:var(--text-dim);
      text-decoration:none;letter-spacing:0.08em;
      border:1px solid rgba(255,255,255,0.1);
      padding:6px 16px;border-radius:20px;
      transition:all 0.3s;position:relative;z-index:1;
    }
    .nav-back:hover{color:#e74c3c;border-color:#e74c3c;box-shadow:0 0 12px rgba(231,76,60,0.2);}
  
    .nav-links .nav-about-btn{
      font-family:'Cinzel',serif;font-size:12px;font-weight:600;
      color:var(--text-dim);background:none;border:none;
      letter-spacing:0.1em;text-transform:uppercase;
      cursor:pointer;padding:0;transition:color 0.3s;
      position:relative;
    }
    .nav-links .nav-about-btn::after{
      content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;
      background:var(--accent,#c9a84c);transform:scaleX(0);transition:transform 0.3s;
    }
    .nav-links .nav-about-btn:hover{color:var(--accent-light,#e8cc7a);}
    .nav-links .nav-about-btn:hover::after{transform:scaleX(1);}
  
    /* ── Search bar ── */
    .search-wrap{
      max-width:480px;margin:0 auto 32px;position:relative;
    }
    .search-input{
      width:100%;padding:12px 44px 12px 18px;
      font-family:'Cinzel',serif;font-size:12px;letter-spacing:0.08em;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(201,168,76,0.2);
      border-radius:30px;color:var(--text);
      outline:none;transition:all 0.3s;
    }
    .search-input::placeholder{color:var(--text-dim);letter-spacing:0.08em;}
    .search-input:focus{border-color:rgba(201,168,76,0.5);background:rgba(255,255,255,0.07);box-shadow:0 0 16px rgba(201,168,76,0.08);}
    .search-icon{
      position:absolute;right:16px;top:50%;transform:translateY(-50%);
      color:var(--text-dim);font-size:14px;pointer-events:none;
    }
    .search-clear{
      position:absolute;right:16px;top:50%;transform:translateY(-50%);
      color:var(--text-dim);font-size:16px;cursor:pointer;display:none;
      background:none;border:none;line-height:1;transition:color 0.2s;
    }
    .search-clear:hover{color:var(--gold);}
    .search-count{
      text-align:center;font-family:'Cinzel',serif;font-size:10px;
      letter-spacing:0.2em;color:var(--text-dim);margin-bottom:24px;
      height:16px;transition:opacity 0.3s;
    }
    .no-results{
      text-align:center;padding:64px 24px;
      font-style:italic;color:var(--text-dim);font-size:16px;
    }
    /* Cards hidden by search */
    .arcane-card.search-hidden{display:none;}
    /* Group title hidden when all cards hidden */
    .arcane-group.search-empty .arcane-group-title{opacity:0.3;}

    /* Show more / collapse for skills */
    .arcane-group.skills-collapsed .arcane-card.skills-extra{display:none;}
    .arcane-group.skills-collapsed.search-expanded .arcane-card.skills-extra{display:block;}
    .show-more-wrap{text-align:center;margin-top:24px;}
    .show-more-btn{
      font-family:'Cinzel',serif;font-size:11px;font-weight:600;
      letter-spacing:0.12em;text-transform:uppercase;
      color:var(--gold);background:none;
      border:1px solid rgba(201,168,76,0.3);
      padding:9px 28px;border-radius:20px;
      cursor:pointer;transition:all 0.3s;
    }
    .show-more-btn:hover{
      background:rgba(201,168,76,0.08);
      border-color:var(--gold);
      box-shadow:0 0 16px rgba(201,168,76,0.15);
    }

    /* ── HAMBURGER ── */
    .nav-hamburger{
      display:none;flex-direction:column;justify-content:center;align-items:center;
      gap:5px;width:36px;height:36px;background:none;
      border:1px solid rgba(255,255,255,0.1);border-radius:6px;
      cursor:pointer;position:relative;z-index:101;padding:6px;flex-shrink:0;
    }
    .nav-hamburger span{
      display:block;width:18px;height:1.5px;
      background:var(--text-dim);border-radius:2px;
      transition:transform 0.3s,opacity 0.3s;transform-origin:center;
    }
    .nav-hamburger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);}
    .nav-hamburger.open span:nth-child(2){opacity:0;}
    .nav-hamburger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);}
    .nav-divination-li{display:none;}
    @media(max-width:768px){
      nav{padding:0 20px;}
      .nav-hamburger{display:flex;}
      .nav-back{display:none;}
      .nav-divination-li{display:block;}
      .nav-links{
        display:none;position:fixed;top:64px;left:0;right:0;
        background:rgba(6,8,10,0.97);backdrop-filter:blur(16px);
        border-bottom:1px solid rgba(231,76,60,0.2);
        flex-direction:column;gap:0;padding:8px 0 16px;z-index:99;list-style:none;
      }
      .nav-links.open{display:flex;}
      .nav-links li{width:100%;}
      .nav-links a,.nav-links .nav-about-btn{
        display:block;width:100%;padding:13px 24px;font-size:14px;text-align:left;
      }
      .nav-links a::after,.nav-links .nav-about-btn::after{display:none;}
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">✦ Arcana ✦</div>
  <button class="nav-hamburger" id="navHamburger" aria-label="Menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links" id="navLinks">
    <li><a href="runes.html">Runes</a></li>
    <li><a href="chaudron.html">Cauldron</a></li>
    <li><a href="cristal.html">Cristal</a></li>
    <li><a href="constellation.html">Constellation</a></li>
    <li><a href="tarot.html">Tarot</a></li>
    <li><a href="arcanes.html" class="active">Card List</a></li>
    <li><button id="btn-about" class="nav-about-btn">About me - Antoine Dedieu</button></li>
    <li class="nav-divination-li"><a href="index.html">← Divination</a></li>
  </ul>
  <a href="index.html" class="nav-back">← Divination</a>
</nav>


<div class="page">
  <div class="page-header">
    <div class="page-eyebrow">Complete Grimoire</div>
    <h1 class="page-title">All Arcana</h1>
    <div class="ornament">
      <span style="color:var(--gold)">✦</span>
      <span style="color:var(--gold-dim);font-size:10px">✦</span>
      <span style="color:var(--gold)">✦</span>
    </div>
  </div>


  <!-- Search -->
  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text"
           placeholder="Search by name, skill, tag…"
           oninput="onSearch(this.value)"
           onkeydown="if(event.key==='Escape'){clearSearch();}">
    <span class="search-icon" id="searchIcon">🔍</span>
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
  <div class="search-count" id="searchCount"></div>

  <!-- Filtres -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterCards('all',this)" data-cat="all">✦ All Arcana</button>
    <button class="filter-btn" onclick="filterCards('formations',this)" data-cat="formations">🎓 Education</button>
    <button class="filter-btn" onclick="filterCards('competences',this)" data-cat="competences">⚡ Skills</button>
    <button class="filter-btn" onclick="filterCards('experiences',this)" data-cat="experiences">🔬 Experiences</button>
  </div>

  <!-- Education -->
  <div class="arcane-groups">
  <div class="arcane-group" id="group-formations">
    <div class="group-header">
      <span class="group-icon">🎓</span>
      <h2 class="group-title">Arcana of Education</h2>
      <div class="group-line"></div>
      <span class="group-count" id="count-formations"></span>
    </div>
    <div class="cards-row" id="row-formations"></div>
  </div>

  <!-- Skills -->
  <div class="arcane-group" id="group-competences">
    <div class="group-header">
      <span class="group-icon">⚡</span>
      <h2 class="group-title">Arcana of Skills</h2>
      <div class="group-line"></div>
      <span class="group-count" id="count-competences"></span>
    </div>
    <div class="cards-row" id="row-competences"></div>
    <div class="show-more-wrap" id="skills-show-more-wrap">
      <button class="show-more-btn" id="skills-show-more-btn" onclick="toggleSkills(this)"></button>
    </div>
  </div>

  <!-- Experiences -->
  <div class="arcane-group" id="group-experiences">
    <div class="group-header">
      <span class="group-icon">🔬</span>
      <h2 class="group-title">Arcana of Experiences</h2>
      <div class="group-line"></div>
      <span class="group-count" id="count-experiences"></span>
    </div>
    <div class="cards-row" id="row-experiences"></div>
  </div>
</div>
</div><!-- /arcane-groups -->

<!-- MODALE -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-header">
      <div class="modal-thumb" id="mThumb"></div>
      <div class="modal-meta">
        <div class="modal-type" id="mType"></div>
        <div class="modal-title" id="mTitle"></div>
        <div class="modal-subtitle" id="mSub"></div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-prophecy" id="mProphecy"></div>
      <div class="modal-details" id="mDetails"></div>
      <div class="modal-tags" id="mTags"></div>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script>
function renderEmoji(val, size) {
  if(val && (val.startsWith('http') || val.startsWith('/'))) {
    return `<img src="${val}" style="width:${size}px;height:${size}px;object-fit:contain;" alt="">`;
  }
  return val || '';
}

// Utilise FORMATIONS, COMPETENCES, EXPERIENCES, PROJETS depuis data.js
// Data loaded from js/data.js

// Use data directly from data.js (loaded via <script src="js/data.js">)
const data = { FORMATIONS, COMPETENCES, EXPERIENCES, PROJETS };

// Render a row of cards
function renderRow(containerId, cards) {
  const el = document.getElementById(containerId);
  el.innerHTML = cards.map(c => {
    const cat = c.type.replace('Arcana of ','');
    return `<div class="arcane-card" onclick='openModal(${JSON.stringify(c).replace(/'/g,"&#39;")})'>
      <div class="arcane-card-visual" style="background:${c.gradient}">
        <div class="card-art">
          <div class="card-roman">${c.roman}</div>
          <div class="card-emoji">${renderEmoji(c.emoji, 48)}</div>
        </div>
        <div class="card-footer">
          <div class="card-name">${c.name}</div>
          <div class="card-cat">${cat}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// Filter by category
function filterCards(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

// Modale
function openModal(c) {
  document.getElementById('mThumb').innerHTML = renderEmoji(c.emoji, 64);
  document.getElementById('mThumb').style.background = c.gradient;
  document.getElementById('mType').textContent = c.type;
  document.getElementById('mTitle').textContent = c.name;
  document.getElementById('mSub').textContent = c.subtitle;
  document.getElementById('mProphecy').textContent = c.prophecy;
  document.getElementById('mDetails').innerHTML = Object.entries(c.details).map(([k,v])=>
    `<div class="modal-detail"><div class="modal-detail-label">${k}</div><div class="modal-detail-value">${v}</div></div>`).join('');
  document.getElementById('mTags').innerHTML = c.tags.map(t=>`<span class="modal-tag">${t}</span>`).join('');
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay') && !e.target.classList.contains('modal-close')) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal({target:document.getElementById('modalOverlay')}); });

// Init
const SKILLS_INITIAL = 8;
window.addEventListener('DOMContentLoaded', () => {
  renderRow('row-formations',  data.FORMATIONS);
  renderRow('row-competences', data.COMPETENCES);
  renderRow('row-experiences', data.EXPERIENCES);
 

  // Collapse skills beyond SKILLS_INITIAL
  document.querySelectorAll('#row-competences .arcane-card').forEach((c, i) => {
    if (i >= SKILLS_INITIAL) c.classList.add('skills-extra');
  });
  document.getElementById('group-competences').classList.add('skills-collapsed');
  document.getElementById('skills-show-more-btn').textContent =
    `Show all skills ▾`;
});

function toggleSkills(btn) {
  const group = document.getElementById('group-competences');
  const isCollapsed = group.classList.toggle('skills-collapsed');
  btn.textContent = isCollapsed
    ? `Show all skills ▾`
    : 'Show less ▴';
}

// ── SEARCH ──
let currentSearch = '';

function onSearch(q) {
  currentSearch = q.trim().toLowerCase();

  // Toggle clear/icon button
  document.getElementById('searchClear').style.display = currentSearch ? 'block' : 'none';
  document.getElementById('searchIcon').style.display  = currentSearch ? 'none'  : 'block';

  applyFilters();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  onSearch('');
  document.getElementById('searchInput').focus();
}

function applyFilters() {
  const q = currentSearch;
  // Get active category from filter button
  const activeBtn = document.querySelector('.filter-btn.active');
  const cat = activeBtn ? activeBtn.getAttribute('data-cat') : 'all';

  // All cards across all groups
  const allCards = document.querySelectorAll('.arcane-card');
  let visible = 0;

  allCards.forEach(card => {
    // Category filter
    const group = card.closest('.arcane-group');
    const groupId = group ? group.id.replace('group-','') : '';
    const catMatch = cat === 'all' || groupId === cat;

    // Search filter — match name, subtitle, tags, type
    let searchMatch = true;
    if(q) {
      const name     = (card.querySelector('.card-name')?.textContent   || '').toLowerCase();
      const sub      = (card.querySelector('.card-cat')?.textContent     || '').toLowerCase();
      const tags     = [...card.querySelectorAll('.card-tag')].map(t=>t.textContent.toLowerCase()).join(' ');
      const roman    = (card.querySelector('.card-roman')?.textContent   || '').toLowerCase();
      searchMatch = name.includes(q) || sub.includes(q) || tags.includes(q) || roman.includes(q);
    }

    const show = catMatch && searchMatch;
    card.classList.toggle('search-hidden', !show);
    if(show) visible++;
  });

  // Show/hide group headers based on whether any card is visible in that group
  document.querySelectorAll('.arcane-group').forEach(group => {
    const anyVisible = [...group.querySelectorAll('.arcane-card')].some(c => !c.classList.contains('search-hidden'));
    group.classList.toggle('hidden', !anyVisible);
    group.classList.toggle('search-empty', !anyVisible);
  });

  // Auto-expand skills when searching so results aren't hidden
  document.getElementById('group-competences').classList.toggle('search-expanded', !!q);
  document.getElementById('skills-show-more-wrap').style.display = q ? 'none' : '';

  // Count display
  const countEl = document.getElementById('searchCount');
  if(q) {
    const total = document.querySelectorAll('.arcane-card').length;
    countEl.textContent = visible === 0
      ? 'No arcana found'
      : `${visible} arcana found`;
    countEl.style.opacity = '1';
  } else {
    countEl.textContent = '';
  }

  // No results message
  let noRes = document.getElementById('noResults');
  if(visible === 0 && q) {
    if(!noRes) {
      noRes = document.createElement('div');
      noRes.id = 'noResults';
      noRes.className = 'no-results';
      document.querySelector('.arcane-groups')?.appendChild(noRes);
    }
    noRes.innerHTML = `No arcana matching <em>"${q}"</em> — try a skill name or tag.`;
    noRes.style.display = 'block';
  } else if(noRes) {
    noRes.style.display = 'none';
  }
}

</script>
